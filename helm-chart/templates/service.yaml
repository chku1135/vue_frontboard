apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  annotations:
    {{- if .Values.service.loadBalancerIP }}
    metallb.universe.tf/loadBalancerIPs: {{ .Values.service.loadBalancerIP | quote }}
    {{- end }}
spec:
  type: {{ .Values.service.type | default "LoadBalancer" }}
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80
